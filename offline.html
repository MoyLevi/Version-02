<style>
body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0f172a;color:#fff;font-family:Arial,sans-serif;text-align:center;padding:24px} .card{max-width:520px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:22px;padding:28px} img{width:92px;height:92px;border-radius:22px} h1{margin:18px 0 8px;font-size:28px} p{line-height:1.5;color:#dbeafe} button{margin-top:12px;border:0;border-radius:999px;padding:12px 18px;background:#38bdf8;color:#082f49;font-weight:700;cursor:pointer}

<main class="card">
<img src="icons/icon-192.png" alt="Quiniela Mundial 2026">
